<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ABM Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #0b111e;
  --sidebar-bg: #0d1526;
  --panel: #111b2e;
  --panel2: #182338;
  --panel3: #1f2c45;
  --border: rgba(99,140,255,0.1);
  --border2: rgba(99,140,255,0.18);
  --text: #e1e8f4;
  --muted: #7e8ca5;
  --accent: #4f7cff;
  --accent2: #6366f1;
  --accent-glow: rgba(79,124,255,0.12);
  --danger: #f87171;
  --sidebar-w: 268px;
  --radius: 14px;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--panel3); border-radius: 99px; }

/* ─── App shell ─── */
.app {
  display: flex;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

/* ─── Overlay (mobile) ─── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 40;
  backdrop-filter: blur(2px);
}
.overlay.active { display: block; }

/* ─── Sidebar ─── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100%;
  transition: transform 0.3s ease;
}

.sidebar-top {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-shrink: 0;
}

.logo {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #a5bfff, #7c8eff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.new-chat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 13px;
  border-radius: 99px;
  border: 1px solid var(--border2);
  background: var(--panel2);
  color: var(--text);
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 600;
  font-family: var(--font);
  white-space: nowrap;
  transition: background 0.2s, border-color 0.2s;
}
.new-chat-pill:hover { background: var(--panel3); border-color: var(--accent); }

.search-box {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  padding: 9px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted); }

.conversation-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px 8px;
}

.conv-group-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 6px 6px 4px;
}

.conversation-item {
  padding: 9px 10px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  transition: background 0.15s;
}
.conversation-item:hover { background: rgba(255,255,255,0.06); }
.conversation-item.active { background: var(--accent-glow); }

.conv-title {
  flex: 1;
  font-size: 0.83rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.delete-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 6px;
  font-size: 0.75rem;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.delete-btn:hover { color: var(--danger); }

/* ─── Sidebar settings (collapsible) ─── */
.sidebar-settings {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  flex-shrink: 0;
}

.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 6px 0;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  user-select: none;
}

.settings-header svg {
  width: 16px;
  height: 16px;
  transition: transform 0.2s;
}
.settings-header.collapsed svg {
  transform: rotate(-90deg);
}

.settings-body {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
  transition: max-height 0.3s ease;
  overflow: hidden;
  max-height: 200px;
}
.settings-body.hidden {
  max-height: 0;
  margin-top: 0;
  opacity: 0;
}

.settings-body .setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.82rem;
}

.settings-body label {
  color: var(--muted);
  font-size: 0.75rem;
}

.settings-body select {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font);
  font-size: 0.78rem;
  padding: 4px 8px;
  border-radius: 6px;
  outline: none;
  max-width: 130px;
}

/* Toggle switch */
.switch-sm { position: relative; display: inline-block; width: 38px; height: 20px; }
.switch-sm input { opacity: 0; width: 0; height: 0; }
.switch-sm .slider {
  position: absolute; inset: 0;
  background: var(--panel3);
  border-radius: 99px;
  cursor: pointer;
  transition: background 0.2s;
  border: 1px solid var(--border);
}
.switch-sm .slider::before {
  content: ''; position: absolute;
  width: 15px; height: 15px; left: 2px; top: 50%;
  transform: translateY(-50%);
  background: white; border-radius: 50%;
  transition: transform 0.2s;
}
input:checked + .slider { background: var(--accent); border-color: var(--accent); }
input:checked + .slider::before { transform: translateX(16px) translateY(-50%); }

/* ─── Main area ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  height: 100%;
  overflow: hidden;
}

.topbar {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: rgba(11,17,30,0.9);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
  z-index: 10;
  position: sticky;
  top: 0;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hamburger {
  display: none;
  background: transparent;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
}
.hamburger:hover { background: rgba(255,255,255,0.07); }

.topbar-title {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.top-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.model-select-pill {
  background: var(--panel2);
  border: 1px solid var(--border2);
  border-radius: 99px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 500;
  padding: 6px 12px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.2s;
  max-width: 140px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.model-select-pill:hover { border-color: var(--accent); }

/* ─── Chat box ─── */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ─── Welcome screen ─── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 40px 16px;
  gap: 16px;
  animation: fadeUp 0.4s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(16px); }
  to   { opacity:1; transform: translateY(0); }
}
.welcome h1 {
  font-size: clamp(1.5rem, 4vw, 2.1rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #c8d8ff, #a0b4ff, #7c8eff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
}
.welcome p {
  color: var(--muted);
  font-size: 0.9rem;
  text-align: center;
}
.suggestions {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  max-width: 100%;
  scrollbar-width: none;
}
.suggestions::-webkit-scrollbar { display: none; }
.suggestion-btn {
  padding: 8px 14px;
  border-radius: 99px;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  font-size: 0.82rem;
  font-family: var(--font);
  font-weight: 500;
  white-space: nowrap;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.suggestion-btn:hover { background: var(--panel3); border-color: var(--accent); transform: translateY(-1px); }

/* ─── Messages ─── */
.message {
  padding: 14px 16px;
  border-radius: var(--radius);
  line-height: 1.75;
  font-size: 0.92rem;
  animation: msgIn 0.25s ease;
}
@keyframes msgIn {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
.message.user {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  align-self: flex-end;
  max-width: 72%;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 20px rgba(79,124,255,0.25);
}
.message.bot {
  background: var(--panel2);
  border: 1px solid var(--border);
  align-self: flex-start;
  max-width: 86%;
  border-bottom-left-radius: 4px;
  white-space: pre-wrap;      /* fallback for line breaks */
  word-break: break-word;
}
.message.bot h1,.message.bot h2,.message.bot h3 { margin: 12px 0 6px; font-weight: 600; }
.message.bot p { margin-bottom: 8px; }
.message.bot p:last-child { margin-bottom: 0; }
.message.bot ul,.message.bot ol { padding-left: 20px; margin-bottom: 8px; }
.message.bot code:not(pre code) {
  font-family: var(--mono);
  font-size: 0.85em;
  background: rgba(255,255,255,0.08);
  padding: 2px 6px;
  border-radius: 5px;
}

/* Code block container */
.code-block-wrapper {
  position: relative;
  margin: 12px 0;
  border-radius: 10px;
  overflow: hidden;
}

.code-block-wrapper pre {
  margin: 0;
  border-radius: 10px;
  padding-right: 50px;
}

.copy-code-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
  z-index: 5;
  font-family: var(--font);
  line-height: 1;
}
.copy-code-btn:hover {
  background: rgba(255,255,255,0.15);
}

/* Action buttons (compact pill style) */
.message-actions {
  margin-top: 12px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.action-btn {
  padding: 4px 10px;
  border-radius: 7px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font-size: 0.7rem;
  font-family: var(--font);
  font-weight: 500;
  line-height: 1.4;
  transition: background 0.15s, color 0.15s;
  flex: none;
  white-space: nowrap;
}
.action-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

/* Model tag at bottom of bot messages */
.model-tag {
  text-align: right;
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 6px;
  opacity: 0.8;
}

/* ─── Input area ─── */
.input-area {
  padding: 12px 16px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: rgba(11,17,30,0.95);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}

.input-shell {
  flex: 1;
  padding: 11px 14px;
  border-radius: 14px;
  background: var(--panel2);
  border: 1px solid var(--border);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-shell:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,124,255,0.12);
}

textarea {
  width: 100%;
  resize: none;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.92rem;
  font-family: var(--font);
  min-height: 22px;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.55;
}
textarea::placeholder { color: var(--muted); }

.send-btn {
  padding: 11px 18px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-family: var(--font);
  font-size: 0.88rem;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 14px rgba(79,124,255,0.3);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ─── Mobile responsive ─── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: 4px 0 30px rgba(0,0,0,0.4);
    z-index: 50;
  }
  .sidebar.open { transform: translateX(0); }

  .hamburger { display: flex; }

  .chat-box {
    padding: 14px 10px 8px;
    padding-bottom: 80px;
  }

  .message.user,
  .message.bot {
    max-width: 94%;
    font-size: 0.88rem;
  }

  .send-btn span { display: none; }

  .delete-btn { opacity: 0.7; }

  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(11,17,30,0.98);
    padding: 10px 12px 12px;
    z-index: 15;
  }

  .main {
    padding-bottom: 70px;
  }
}
</style>
</head>
<body>

<div class="app">
  <!-- Mobile overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <span class="logo">ABM Chat</span>
      <button class="new-chat-pill" id="new-chat-btn">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        New chat
      </button>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search conversations…">
    </div>
    <div class="conversation-list" id="conversation-list"></div>

    <!-- Collapsible Settings (closed by default) -->
    <div class="sidebar-settings">
      <div class="settings-header collapsed" id="settings-toggle">
        <span>⚙ Settings</span>
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="settings-body hidden" id="settings-body">
        <div class="setting-row">
          <label>Voice</label>
          <select id="voice-select"><option value="">Default</option></select>
        </div>
        <div class="setting-row">
          <span>Memory</span>
          <label class="switch-sm">
            <input type="checkbox" id="memory-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <span>Streaming</span>
          <label class="switch-sm">
            <input type="checkbox" id="streaming-toggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Main chat column -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="topbar-title" id="topbar-title">New Chat</span>
      </div>
      <div class="top-actions">
        <select class="model-select-pill" id="model-select"></select>
      </div>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area" id="input-area">
      <div class="input-shell">
        <textarea id="message-input" rows="1" placeholder="Message ABM Chat…"></textarea>
      </div>
      <button class="send-btn" id="send-button">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/></svg>
        <span>Send</span>
      </button>
    </div>
  </div>
</div>

<script>
// ─── Markdown: enable line breaks ───
marked.setOptions({ breaks: true });

// ─── State ───
const chatBox = document.getElementById("chat-box");
const messageInput = document.getElementById("message-input");
const sendButton = document.getElementById("send-button");
const conversationList = document.getElementById("conversation-list");
const modelSelect = document.getElementById("model-select");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const topbarTitle = document.getElementById("topbar-title");
const streamingToggle = document.getElementById("streaming-toggle");
const memoryToggle = document.getElementById("memory-toggle");
const voiceSelect = document.getElementById("voice-select");

let currentConversationId = null;
let chatHistory = [];
let allVoices = [];

// ─── Abort controller for stopping generation ───
let currentAbortController = null;

// ─── Settings collapse (closed by default) ───
const settingsToggle = document.getElementById("settings-toggle");
const settingsBody = document.getElementById("settings-body");
let settingsExpanded = false;

settingsToggle.addEventListener("click", () => {
  settingsExpanded = !settingsExpanded;
  if (settingsExpanded) {
    settingsBody.classList.remove("hidden");
    settingsToggle.classList.remove("collapsed");
  } else {
    settingsBody.classList.add("hidden");
    settingsToggle.classList.add("collapsed");
  }
});

// Initial state: closed (already set in HTML, but ensure)
settingsBody.classList.add("hidden");
settingsToggle.classList.add("collapsed");

// ─── Load saved preferences ───
const savedStreaming = localStorage.getItem("abm_streaming");
if (savedStreaming !== null) streamingToggle.checked = savedStreaming === "true";
const savedMemory = localStorage.getItem("abm_memory");
if (savedMemory !== null) memoryToggle.checked = savedMemory === "true";
const savedVoice = localStorage.getItem("abm_voice");
if (savedVoice !== null) voiceSelect.value = savedVoice;

streamingToggle.addEventListener("change", () => {
  localStorage.setItem("abm_streaming", streamingToggle.checked);
});
memoryToggle.addEventListener("change", () => {
  localStorage.setItem("abm_memory", memoryToggle.checked);
});
voiceSelect.addEventListener("change", () => {
  localStorage.setItem("abm_voice", voiceSelect.value);
});

// ─── Model name formatter ───
function formatModelName(modelId) {
  if (!modelId) return "";
  const parts = modelId.split("/");
  const provider = parts[0].toLowerCase();
  const full = parts.slice(1).join("/");

  if (provider === "openai") return "OpenAI";
  if (provider === "meta") {
    if (full.includes("maverick")) return "Meta Maverick";
    if (full.includes("scout")) return "Meta Scout";
    const match = full.match(/(\d+b)/i);
    if (match) return `Meta ${match[1].toUpperCase()}`;
    return "Meta";
  }
  if (provider === "deepseek-ai") {
    if (full.includes("r1")) return "DeepSeek R1";
    if (full.includes("coder")) return "DeepSeek Coder";
    return "DeepSeek";
  }
  if (provider === "mistralai") {
    if (full.includes("large")) return "Mistral Large";
    if (full.includes("small")) return "Mistral Small";
    if (full.includes("medium")) return "Mistral Medium";
    return "Mistral";
  }
  if (provider === "nvidia") {
    if (full.includes("nemotron")) return "Nemotron";
    return "NVIDIA";
  }
  if (provider === "qwen") {
    if (full.includes("coder")) return "Qwen Coder";
    return "Qwen";
  }
  if (provider === "minimax") return "MiniMax";
  return provider.charAt(0).toUpperCase() + provider.slice(1);
}

// ─── Browser history management ───
function pushHistoryState(conversationId = null) {
  const url = conversationId ? `?chat=${conversationId}` : window.location.pathname;
  const state = { conversationId };
  history.pushState(state, "", url);
}

window.addEventListener("popstate", (event) => {
  if (event.state && event.state.conversationId) {
    loadConversation(event.state.conversationId, false);
  } else {
    currentConversationId = null;
    chatHistory = [];
    topbarTitle.textContent = "New Chat";
    renderWelcome();
    renderConversationList(cachedConversations);
  }
});

// ─── Suggestion pool ───
const SUGGESTION_POOL = [
  "Build a Python FastAPI app", "Debug my code", "Explain how AI works",
  "Generate HTML page", "Write a SQL query", "Set up Docker",
  "Explain async/await", "Linux terminal tips", "Write a bash script",
  "Optimise database queries", "Create a REST API", "Explain recursion",
  "Regex help", "Write unit tests", "Explain machine learning",
  "Set up CI/CD pipeline", "Compare React vs Vue", "Explain WebSockets",
];

function randomSuggestions(n = 5) {
  const pool = [...SUGGESTION_POOL];
  const out = [];
  while (out.length < n && pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    out.push(pool.splice(i, 1)[0]);
  }
  return out;
}

// ─── Welcome screen ───
function renderWelcome() {
  chatBox.innerHTML = "";
  const welcome = document.createElement("div");
  welcome.className = "welcome";
  welcome.id = "welcome-screen";

  const h1 = document.createElement("h1");
  h1.textContent = "What can I help with?";

  const sub = document.createElement("p");
  sub.textContent = "Ask anything — code, ideas, explanations, or just a chat.";

  const pills = document.createElement("div");
  pills.className = "suggestions";
  randomSuggestions(6).forEach(text => {
    const btn = document.createElement("button");
    btn.className = "suggestion-btn";
    btn.textContent = text;
    btn.onclick = () => {
      messageInput.value = text;

    };

  welcome.appendChild(sub);
  welcome.appendChild(pills);

}

// ─── Conversation list ───
let cachedConversations = [];
async function loadConversations() {
  try {
    const res = await fetch("/conversations");
    const data = await res.json();
    cachedConversations = data.conversations || [];
  } catch (e) { cachedConversations = []; }
  renderConversationList(cachedConversations);
}
function renderConversationList(convs) {
  conversationList.innerHTML = "";
  const query = document.getElementById("search-input").value.toLowerCase();
  const filtered = query ? convs.filter(c => c.title.toLowerCase().includes(query)) : convs;
  if (!filtered.length) {
    const empty = document.createElement("div");
    empty.style.cssText = "color: var(--muted); font-size: 0.8rem; padding: 12px 6px;";
    empty.textContent = "No conversations yet";
    conversationList.appendChild(empty);
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  const groups = { Today: [], Yesterday: [], Earlier: [] };
  filtered.forEach(c => {
    const d = c.created_at ? new Date(c.created_at) : null;
    if (!d || d >= today) groups["Today"].push(c);
    else if (d >= yesterday) groups["Yesterday"].push(c);
    else groups["Earlier"].push(c);
  });
  Object.entries(groups).forEach(([label, items]) => {
    if (!items.length) return;
    const gl = document.createElement("div");
    gl.className = "conv-group-label";
    gl.textContent = label;
    conversationList.appendChild(gl);
    items.forEach(conv => {
      const div = document.createElement("div");
      div.className = "conversation-item" + (conv.id === currentConversationId ? " active" : "");
      const title = document.createElement("span");
      title.className = "conv-title";
      title.textContent = conv.title || "Untitled";
      const del = document.createElement("button");
      del.className = "delete-btn";
      del.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
      del.onclick = async (e) => { e.stopPropagation(); await deleteConversation(conv.id); };
      div.appendChild(title);
      div.appendChild(del);
      div.onclick = () => { loadConversation(conv.id, true); if (window.innerWidth <= 768) closeSidebar(); };
      conversationList.appendChild(div);
    });
  });
}
document.getElementById("search-input").addEventListener("input", () => renderConversationList(cachedConversations));

// ─── Conversation CRUD ───
async function createConversation() {
  try {
    const res = await fetch("/conversations", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: "New chat" })
    });
    const data = await res.json();
    currentConversationId = data.conversation.id;
    topbarTitle.textContent = data.conversation.title || "New Chat";
    pushHistoryState(currentConversationId);
  } catch (e) { currentConversationId = null; }
  chatHistory = [];
  renderWelcome();
  await loadConversations();
}

async function loadConversation(id, pushState = true) {
  currentConversationId = id;
  try {
    const res = await fetch(`/conversations/${id}`);
    const conv = await res.json();
    topbarTitle.textContent = conv.conversation.title || "New Chat";
  } catch (e) { topbarTitle.textContent = "New Chat"; }
  try {
    const res = await fetch(`/conversations/${id}/messages`);
    const data = await res.json();
    chatHistory = data.messages || [];
    chatBox.innerHTML = "";
    chatHistory.forEach(msg => addMessage(msg.content, msg.role === "assistant" ? "bot" : "user", false));
  } catch (e) { renderWelcome(); }
  if (pushState) pushHistoryState(id);
  renderConversationList(cachedConversations);
}

async function deleteConversation(id) {
  try { await fetch(`/conversations/${id}`, { method: "DELETE" }); } catch (e) {}
  if (currentConversationId === id) {
    currentConversationId = null;
    chatHistory = [];
    topbarTitle.textContent = "New Chat";
    renderWelcome();
    history.replaceState(null, "", window.location.pathname);
  }
  await loadConversations();
}

// ─── Helper: wrap code blocks with copy button ───
function enhanceCodeBlocks(containerElement) {
  const pres = containerElement.querySelectorAll("pre");
  pres.forEach(pre => {
    if (pre.parentElement.classList.contains("code-block-wrapper")) return;
    const wrapper = document.createElement("div");
    wrapper.className = "code-block-wrapper";
    const copyBtn = document.createElement("button");
    copyBtn.className = "copy-code-btn";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = (e) => {
      const code = pre.querySelector("code")?.textContent || pre.textContent;
      navigator.clipboard.writeText(code).then(() => {
        copyBtn.textContent = "✓ Copied";
        setTimeout(() => copyBtn.textContent = "Copy", 1500);
      });
      e.stopPropagation();
    };
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    wrapper.appendChild(copyBtn);
  });
}

// ─── Render a bot message, preserving actions ───
function renderBotMessage(div, text, modelId, actionsElement = null) {
  // Capture the actions container before innerHTML wipes it
  const actions = actionsElement || div.querySelector(".message-actions");
  div.innerHTML = marked.parse(text);
  enhanceCodeBlocks(div);
  div.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
  // Re-append actions
  if (actions) div.appendChild(actions);
  // Model tag
  let tag = div.querySelector(".model-tag");
  if (!tag) {
    tag = document.createElement("div");
    tag.className = "model-tag";
    div.appendChild(tag);
  }
  tag.textContent = modelId ? formatModelName(modelId) : "";
}

// ─── Add message (for loaded or user) ───
function addMessage(text, sender, animate = true, modelId = null) {
  const welcome = document.getElementById("welcome-screen");
  if (welcome) welcome.remove();
  const div = document.createElement("div");
  div.className = `message ${sender}`;
  if (!animate) div.style.animation = "none";

  if (sender === "bot") {
    const actions = document.createElement("div");
    actions.className = "message-actions";
    // Copy button
    const btnCopy = document.createElement("button");
    btnCopy.className = "action-btn"; btnCopy.textContent = "📋 Copy";
    btnCopy.onclick = () => {
      navigator.clipboard.writeText(text);
      btnCopy.textContent = "✓ Copied";
      setTimeout(() => btnCopy.textContent = "📋 Copy", 1500);
    };
    // Retry button
    const btnRetry = document.createElement("button");
    btnRetry.className = "action-btn"; btnRetry.textContent = "🔄 Retry";
    btnRetry.onclick = () => sendMessage(true);
    actions.appendChild(btnCopy);
    actions.appendChild(btnRetry);
    div.appendChild(actions);

    renderBotMessage(div, text, modelId, actions);
  } else {
    div.textContent = text;
  }

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

// ─── Streaming helper (with Stop button and literal \n fix) ───
async function streamBotReply(userMessage, conversationId, model, memory) {
  const botDiv = addMessage("", "bot", true, model);
  const actions = botDiv.querySelector(".message-actions");
  let fullText = "";

  // Create abort controller
  currentAbortController = new AbortController();
  const { signal } = currentAbortController;

  // Add Stop button
  const stopBtn = document.createElement("button");
  stopBtn.className = "action-btn";
  stopBtn.textContent = "⏹ Stop";
  stopBtn.onclick = () => {
    currentAbortController.abort();
    stopBtn.remove();
    sendButton.disabled = false;
    messageInput.focus();
  };
  actions.appendChild(stopBtn);

  const url = "/chat/stream";
  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: userMessage,
        conversation_id: conversationId,
        model: model,
        memory: memory
      }),
      signal
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split("\n\n");
      buffer = parts.pop();
      for (const part of parts) {
        if (part.startsWith("data: ")) {
          let token = part.slice(6);
          // Replace literal \n with actual newlines (in case model sends escaped)
          token = token.replace(/\\n/g, '\n');
          fullText += token;
          renderBotMessage(botDiv, fullText, model, actions);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }
    }
  } catch (err) {
    if (err.name === "AbortError") {
      console.log("Stream aborted by user");
    } else {
      console.error(err);
      fullText += "\n\n⚠ Error during generation.";
    }
  } finally {
    if (stopBtn.parentNode) stopBtn.remove();
    sendButton.disabled = false;
    messageInput.focus();
    currentAbortController = null;
  }

  // Final render
  renderBotMessage(botDiv, fullText, model, actions);
  chatBox.scrollTop = chatBox.scrollHeight;
  return fullText;
}

// ─── Send message ───
async function sendMessage(isRetry = false) {
  // Abort any ongoing stream
  if (currentAbortController) {
    currentAbortController.abort();
    currentAbortController = null;
  }

  const message = isRetry ? (chatHistory.length >= 2 ? chatHistory[chatHistory.length - 2].content : "") : messageInput.value.trim();
  if (!message) return;

  if (!isRetry) {
    addMessage(message, "user");
    messageInput.value = "";
    messageInput.style.height = "auto";
  } else {
    const lastBot = chatBox.querySelector(".message.bot:last-of-type");
    if (lastBot) lastBot.remove();
    if (chatHistory.length >= 1 && chatHistory[chatHistory.length - 1].role === "assistant") {
      chatHistory.pop();
    }
  }

  sendButton.disabled = true;
  const useStreaming = streamingToggle.checked;
  const useMemory = memoryToggle.checked;
  const model = modelSelect.value;

  try {
    if (useStreaming) {
      const fullReply = await streamBotReply(message, currentConversationId, model, useMemory);
      if (!isRetry) {
        chatHistory.push({ role: "user", content: message });
      }
      chatHistory.push({ role: "assistant", content: fullReply });

      try {
        const res = await fetch(`/conversations/${currentConversationId}`);
        const conv = await res.json();
        topbarTitle.textContent = conv.conversation.title || "New Chat";
      } catch (e) {}
      if (!isRetry && chatHistory.length === 2) {
        pushHistoryState(currentConversationId);
      }
      loadConversations();
    } else {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: message,
          conversation_id: currentConversationId,
          model: model,
          memory: useMemory
        })
      });
      const data = await res.json();
      currentConversationId = data.conversation_id;
      const reply = data.reply || "No response";
      addMessage(reply, "bot", true, model);

      if (!isRetry) {
        chatHistory.push({ role: "user", content: message });
      }
      chatHistory.push({ role: "assistant", content: reply });

      if (data.conversation && data.conversation.title) {
        topbarTitle.textContent = data.conversation.title;
      }
      if (!isRetry && chatHistory.length === 2) {
        pushHistoryState(currentConversationId);
      }
      loadConversations();
    }
  } catch (err) {
    console.error(err);
    addMessage("⚠ Error connecting to the server.", "bot");
  } finally {
    sendButton.disabled = false;
    messageInput.focus();
  }
}

// ─── Event bindings ───
sendButton.addEventListener("click", () => sendMessage());
messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById("new-chat-btn").addEventListener("click", async () => {
  await createConversation();
  if (window.innerWidth <= 768) closeSidebar();
});

// Init
window.addEventListener("DOMContentLoaded", () => {
  loadModels();
  loadConversations();
  renderWelcome();
  populateVoices();
});
